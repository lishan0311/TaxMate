version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: taxmate_db
    environment:
      POSTGRES_USER: taxmate
      POSTGRES_PASSWORD: taxmate123
      POSTGRES_DB: taxmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: